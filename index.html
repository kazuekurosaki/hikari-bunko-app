<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikari Bunko - Premium Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="fdf52f93f0015e28fa818982f3a0f9fa7b380123" content="fdf52f93f0015e28fa818982f3a0f9fa7b380123" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Dela+Gothic+One&display=swap');
        body { background: #050508; color: #eee; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .anime-font { font-family: 'Dela Gothic One', cursive; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chip.active { background: #db2777; border-color: #db2777; }
        .ad-box { background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.1); border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    </style>
</head>
<body class="pb-10">

    <nav class="p-5 sticky top-0 z-[1000] glass flex justify-between items-center px-8">
        <h1 onclick="showPage('home')" class="anime-font text-pink-500 text-xl cursor-pointer">HIKARI</h1>
        <div class="flex gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-black border border-white/20 px-3 py-1 rounded-full uppercase">EN/ID</button>
            <div id="status" class="w-3 h-3 bg-red-500 rounded-full"></div>
        </div>
    </nav>

    <!-- PAGE: HOME -->
    <main id="page-home" class="page active max-w-6xl mx-auto p-6">
        <!-- IKLAN HEADER -->
        <div class="ad-box w-full h-24 mb-10 text-[9px] font-bold text-gray-700 uppercase italic">Header Advertisement Slot</div>

        <section class="mb-8">
            <input type="text" id="searchInp" onkeyup="if(event.key==='Enter') { currentPage=1; loadData(); }" placeholder="Search title..." class="w-full p-4 rounded-2xl glass border border-white/10 outline-none text-sm mb-4">
            <div id="sourceChips" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
        </section>

        <!-- GRID NOVEL + IKLAN FEED -->
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12"></div>

        <!-- PAGINATION -->
        <div class="flex justify-center items-center gap-6 mb-12">
            <button onclick="changePage(-1)" class="w-12 h-12 rounded-2xl glass flex justify-center items-center"><i class="fas fa-chevron-left"></i></button>
            <span id="pageInfo" class="font-black text-pink-500">1</span>
            <button onclick="changePage(1)" class="w-12 h-12 rounded-2xl glass flex justify-center items-center"><i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- IKLAN BOTTOM -->
        <div class="ad-box w-full h-40 mb-10 text-[9px] font-bold text-gray-700 uppercase italic">Bottom Advertisement Slot</div>
    </main>

    <!-- PAGE: STATIC CONTENT -->
    <main id="page-static" class="page max-w-3xl mx-auto p-6 pt-10">
        <div class="glass p-10 rounded-[3rem] border border-white/10">
            <h2 id="static-title" class="anime-font text-2xl text-pink-500 mb-6 uppercase"></h2>
            <div id="static-body" class="text-gray-400 text-sm leading-relaxed space-y-4"></div>
            <button onclick="showPage('home')" class="mt-10 px-8 py-3 bg-pink-600 rounded-full font-black text-[10px] uppercase">Back Home</button>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto p-10 border-t border-white/5 text-center text-[10px] font-black text-gray-600 uppercase">
        <div class="flex justify-center gap-6 mb-4">
            <a href="javascript:void(0)" onclick="showPage('about')">About</a>
            <a href="javascript:void(0)" onclick="showPage('privacy')">Privacy</a>
            <a href="javascript:void(0)" onclick="showPage('disclaimer')">Disclaimer</a>
        </div>
        &copy; 2024 HIKARI BUNKO
    </footer>

    <script>
        const TOKEN = "8787735730:AAFzz21ucAMzsaIt707aCG5xfPQJkpUmz_E";
        let API_URL = "", currentPage = 1, currentSource = "", currentLang = localStorage.getItem('hikari_lang') || 'en';

        const i18n = {
            en: { read: "READ NOW", about_title: "About Us", about_body: "Hikari Bunko is a light novel aggregator.", privacy_title: "Privacy Policy", privacy_body: "We do not collect personal information.", disclaimer_title: "Disclaimer", disclaimer_body: "We are not responsible for third-party content." },
            id: { read: "BACA SEKARANG", about_title: "Tentang Kami", about_body: "Hikari Bunko adalah agregator novel ringan.", privacy_title: "Kebijakan Privasi", privacy_body: "Kami tidak mengumpulkan informasi pribadi.", disclaimer_title: "Sanggahan", disclaimer_body: "Kami tidak bertanggung jawab atas konten pihak ketiga." }
        };

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if(page === 'home') document.getElementById('page-home').classList.add('active');
            else {
                const sp = document.getElementById('page-static');
                sp.classList.add('active');
                document.getElementById('static-title').innerText = i18n[currentLang][page + '_title'];
                document.getElementById('static-body').innerText = i18n[currentLang][page + '_body'];
            }
            window.scrollTo(0,0);
        }

        async function init() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-1`);
                const data = await res.json();
                API_URL = data.result[data.result.length-1].message.text.split("SVR_URL:")[1].trim();
                checkServer();
            } catch(e) { console.log("Waiting server..."); }
        }

        async function checkServer() {
            try {
                const res = await fetch(`${API_URL}/`);
                if(res.ok) {
                    document.getElementById('status').classList.replace('bg-red-500', 'bg-green-500');
                    loadSources(); loadData();
                }
            } catch(e) {}
        }

        async function loadSources() {
            const res = await fetch(`${API_URL}/api/sources`);
            const data = await res.json();
            const cont = document.getElementById('sourceChips');
            cont.innerHTML = `<div onclick="filterSrc('', this)" class="chip active px-5 py-2 rounded-full glass border border-white/10 text-[10px] font-bold uppercase cursor-pointer">All</div>` +
                data.map(s => `<div onclick="filterSrc('${s}', this)" class="chip px-5 py-2 rounded-full glass border border-white/10 text-[10px] font-bold uppercase cursor-pointer">${s}</div>`).join('');
        }

        async function loadData() {
            const q = document.getElementById('searchInp').value;
            const res = await fetch(`${API_URL}/api/news?page=${currentPage}&q=${q}&src=${currentSource}`);
            const data = await res.json();
            const grid = document.getElementById('grid');
            
            grid.innerHTML = data.map((i, index) => {
                // IKLAN DI FEED: Muncul setiap 4 item
                let ad = ((index + 1) % 4 === 0) ? `<div class="col-span-2 md:col-span-1 glass rounded-[2.5rem] p-4 flex flex-col justify-center items-center text-center border-pink-500/20 border-dashed border-2"><p class="text-[8px] font-black text-pink-500 uppercase mb-2">Recommended</p><div class="text-[10px] italic text-gray-700">Native Ad Slot</div></div>` : "";
                
                return ad + `
                <div class="glass rounded-[2.5rem] p-4 border border-white/5 flex flex-col justify-between">
                    <img src="${API_URL}/proxy?url=${encodeURIComponent(i.image)}" class="w-full h-44 object-cover rounded-[2rem] mb-4">
                    <h3 class="font-bold text-[11px] h-10 line-clamp-2 px-1 mb-4 leading-tight">${i.title}</h3>
                    <a href="${i.link}" target="_blank" onclick="track('${i.link}')" class="w-full py-3 bg-pink-600 rounded-2xl text-[9px] font-black text-center uppercase">Read</a>
                </div>`;
            }).join('');
            document.getElementById('pageInfo').innerText = currentPage;
        }

        function changePage(step) { if(currentPage + step >= 1) { currentPage += step; loadData(); window.scrollTo(0,0); } }
        function filterSrc(s, el) { currentSource = s; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); loadData(); }
        function toggleLang() { currentLang = currentLang === 'en' ? 'id' : 'en'; localStorage.setItem('hikari_lang', currentLang); location.reload(); }
        function track(l) { fetch(`${API_URL}/api/track?link=${encodeURIComponent(l)}`); }

        window.onload = init;
    </script>
</body>
</html>
